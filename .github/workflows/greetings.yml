name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          issue-message: |
            👋 Welcome to the Apple Quality AI Project!

            Thank you for opening your first issue.

            Please provide as much detail as possible so the team can understand and address it effectively.

            If this issue is related to:
            • Dataset
            • Model Development
            • Streamlit App
            • Deployment
            • Documentation

            kindly mention it in your description.

            We're glad to have you contributing to the project! 🚀🍎

          pr-message: |
            🎉 Congratulations on your first Pull Request!

            Thank you for contributing to the Apple Quality AI Project.

            Before requesting a review, please ensure:
            ✅ Your code runs successfully.
            ✅ You've tested your changes.
            ✅ Documentation has been updated if necessary.
            ✅ The Pull Request clearly explains what was changed and why.

            Happy coding, and thank you for helping build this project! 🚀
